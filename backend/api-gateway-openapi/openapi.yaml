openapi: 3.0.3
info:
  title: Commit API Gateway
  description: |
    HTTP surface exposed by the **api-gateway** service (`services/api-gateway`).

    - **Auth** paths under `/api/v1/auth/*` are reverse-proxied to the authentication service (FastAPI).
      Request/response bodies match that service unless noted.
    - **Profiles**, **recommendations**, **swipes**, and **matches** are routed through the gateway to the backing gRPC services. **GET /swipes** and **GET /recommendations** both resolve user ids from their backing service, then load rows via **profiles** `GetProfiles`.
    - **Chats** (`/api/v1/chats/*`) are reverse-proxied to the **chats** FastAPI service. **`/api/v1/chats/{peer_user_id}/ws`** is a **bidirectional** WebSocket: clients send JSON **text** / **image** frames; the server broadcasts **`chat.new_message`** to both participants' open room sockets. If the **recipient** has an active room with the **sender**, **`chat.message`** Kafka is **not** published (no duplicate notification — they already saw the message on the chat WS). **`POST .../messages`** remains for REST/multipart (e.g. large images).
    - **Notifications** (`/api/v1/notifications/*`) are reverse-proxied to the **notifications** FastAPI service (including **`/api/v1/notifications/ws`** WebSocket upgrades). Use query param **`token=<JWT>`** for the WebSocket handshake; the gateway validates JWT and forwards **`X-User-Id`**.
    - **Recommendations** HTTP routes call the **recommendations** gRPC service for candidate ids (and filter CRUD on `/recommendations/filters`); **GET /recommendations** loads profile rows via **profiles** `GetProfiles` by those ids (except **compatibility**, which stays inside the recommendations service and uses **Ollama** for text generation).
    - Protected routes require `Authorization: Bearer <JWT>`. The gateway validates the token and expects a numeric `sub` claim (user id).

    **JSON naming**
    - Profile handlers serialize protobuf types with Go `encoding/json` using **snake_case** field names (e.g. `profile_data`, `user_id`).
    - Recommendation responses use **protobuf JSON** (`protojson`): **camelCase** names and enum values as strings.

    JWT middleware may return **plain text** errors (e.g. `Unauthorized`); handlers often return JSON `{"error":"..."}`.
  version: 1.0.0

servers:
  - url: http://localhost:18000
    description: API gateway from host when using docker-compose on Windows (host port avoids 7916–8015 exclusion)
  - url: http://localhost:8080
    description: Local API gateway without Docker (or custom mapping)

tags:
  - name: Health
  - name: Auth
    description: Proxied to the authentication service
  - name: Profiles
  - name: Recommendations
  - name: Swipes
  - name: Matches
  - name: Notifications
    description: |
      Real-time user events via WebSocket (`/api/v1/notifications/ws`); Kafka-fed from other services.
      **`chat.message`** appears here only when the **recipient is not** in an active **chat room** WebSocket
      (`/api/v1/chats/{peer}/ws`) with the sender — otherwise they already received **`chat.new_message`** on the chat socket.
      Proxied to the notifications service; gateway validates JWT → `X-User-Id` (use `?token=` for WS).
  - name: Chats
    description: |
      Direct messages: REST for listing chats, loading history, and optional **multipart** sends; **WebSocket**
      `/api/v1/chats/{peer_user_id}/ws` for live **send/receive** while in the thread. Gateway JWT → `X-User-Id`;
      WebSockets use **`?token=<JWT>`** like notifications. See **`#/components/schemas/ChatWebSocketServerNewMessage`**
      and related schemas under **Components → Schemas**.

paths:
  /health:
    get:
      tags: [Health]
      summary: Liveness check
      operationId: healthCheck
      responses:
        '200':
          description: Service is up
          content:
            text/plain:
              schema:
                type: string
                example: ok

  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      operationId: authRegister
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '4XX':
          description: Validation or conflict (auth service)
        '502':
          description: Bad gateway (proxy error)

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login
      operationId: authLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials
        '502':
          description: Bad gateway

  /api/v1/auth/token:
    post:
      tags: [Auth]
      summary: Refresh access token
      operationId: authRefreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshTokenResponse'
        '502':
          description: Bad gateway

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Logout (invalidate refresh token)
      operationId: authLogout
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: Missing or invalid JWT
        '502':
          description: Bad gateway

  /api/v1/auth/me:
    description: |
      **Account deletion only** (`DELETE`). There is **no** `GET /api/v1/auth/me` on the gateway — use
      **`GET /api/v1/profiles/me`** for the current user’s profile payload.
    delete:
      tags: [Auth]
      summary: Delete account
      operationId: authDeleteAccount
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteAccountRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: Missing or invalid JWT
        '502':
          description: Bad gateway

  /api/v1/profiles/me:
    get:
      tags: [Profiles]
      summary: Get my profile
      operationId: profilesGetMe
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK (snake_case JSON)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetProfileResponseSnake'
        '401':
          description: Unauthorized
        '502':
          description: Bad gateway
    put:
      tags: [Profiles]
      summary: Update my profile
      operationId: profilesUpdateMe
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequestBody'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateProfileResponseSnake'
        '400':
          description: Invalid body or relationship_type
        '401':
          description: Unauthorized
        '502':
          description: Bad gateway

  /api/v1/profiles:
    post:
      tags: [Profiles]
      summary: Create my profile (first time)
      description: >
        Inserts the profile row if needed, then applies full profile fields via the profiles service
        (same as gRPC `CreateProfile`). User id is taken from the JWT.
      operationId: profilesCreate
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProfileRequestBody'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateProfileResponseSnake'
        '400':
          description: Invalid body
        '401':
          description: Unauthorized
        '502':
          description: Bad gateway
    get:
      tags: [Profiles]
      summary: Get profiles by ids
      operationId: profilesGetByIds
      security:
        - bearerAuth: []
      parameters:
        - name: ids
          in: query
          required: true
          description: Comma-separated user ids
          schema:
            type: string
            example: '1,2,3'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetProfilesResponseSnake'
        '400':
          description: Missing or invalid ids
        '401':
          description: Unauthorized
        '502':
          description: Bad gateway

  /api/v1/profiles/{user_id}:
    get:
      tags: [Profiles]
      summary: Get profile by user id
      operationId: profilesGetById
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetProfileResponseSnake'
        '400':
          description: Invalid user_id
        '401':
          description: Unauthorized
        '502':
          description: Bad gateway

  /api/v1/profiles/images:
    post:
      tags: [Profiles]
      summary: Upload profile images (multipart)
      operationId: profilesUploadImages
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                images:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Preferred field name for multiple files
                image:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Alternative field name accepted by the gateway
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadImagesResponseGateway'
        '400':
          description: Invalid multipart / no files
        '401':
          description: Unauthorized
        '502':
          description: Bad gateway
    delete:
      tags: [Profiles]
      summary: Delete profile images by id
      operationId: profilesDeleteImages
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteProfileImagesRequestBody'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteProfileImagesResponseSnake'
        '400':
          description: Invalid body
        '401':
          description: Unauthorized
        '502':
          description: Bad gateway

  /api/v1/profiles/tags:
    post:
      tags: [Profiles]
      summary: Attach tags to my profile
      operationId: profilesAttachTags
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagsRequestBody'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagsSuccessResponseSnake'
        '400':
          description: Invalid JSON
        '401':
          description: Unauthorized
        '502':
          description: Bad gateway
    delete:
      tags: [Profiles]
      summary: Detach tags from my profile
      operationId: profilesDetachTags
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagsRequestBody'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetachTagsSuccessResponseSnake'
        '400':
          description: Invalid JSON
        '401':
          description: Unauthorized
        '502':
          description: Bad gateway

  /api/v1/recommendations:
    get:
      tags: [Recommendations]
      summary: Recommended profiles for the current user
      description: |
        No query parameters or body. The gateway calls the **recommendations** gRPC `GetRecommendationsForUser` with the JWT user id,
        receives candidate user ids, then calls **profiles** `GetProfiles` with those ids and returns that result (filters still apply inside the recommendations service when computing ids).
      operationId: recommendationsGet
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK — same shape as profiles `GetProfiles` (camelCase protobuf JSON, `profilesData`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetProfilesWithFilterResponseProtoJson'
        '401':
          description: Unauthorized
        '502':
          description: Bad gateway (recommendations or profiles gRPC error)

  /api/v1/recommendations/compatibility:
    post:
      tags: [Recommendations]
      summary: Short astrological compatibility blurbs vs other user ids
      description: |
        Proxies to recommendations gRPC `GetCompatibilityTexts`. The service loads **viewer** and **candidates**
        from its own Postgres `user_features` (**sign**, **birthday** as Unix seconds). It calls a **local Ollama**
        model (`OLLAMA_MODEL`, default `qwen2.5:3b`) calls **one Ollama generation per requested user id** with JSON mode for structured output; returns longer Russian blurbs (see recommendations service).

        - Request body lists **`user_ids`** to compare with the JWT user. The viewer’s own id is ignored if present.
        - Unknown user ids (no `user_features` row) still appear in the response with a **default** placeholder text (Russian).
        - Generated blurbs are requested **in Russian** (local Ollama model).
        - Duplicate ids are deduplicated; at most **20** ids are processed.

        Response is **protobuf JSON** (`protojson`, camelCase), same as other recommendation RPCs exposed as JSON.
      operationId: recommendationsCompatibility
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompatibilityRequestBody'
      responses:
        '200':
          description: "OK — `{ items: [ { userId, text } ] }` (protobuf JSON field names)"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetCompatibilityTextsResponseProtoJson'
        '400':
          description: Invalid JSON body
        '401':
          description: Unauthorized
        '502':
          description: Bad gateway (recommendations gRPC error)

  /api/v1/recommendations/filters:
    get:
      tags: [Recommendations]
      summary: Get stored recommendation filters
      description: Proxies to recommendations gRPC `GetFilters` for the authenticated user.
      operationId: recommendationsFiltersGet
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK (protobuf JSON)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetFiltersResponseProtoJson'
        '401':
          description: Unauthorized
        '502':
          description: Bad gateway
    post:
      tags: [Recommendations]
      summary: Update stored recommendation filters
      description: Proxies to recommendations gRPC `SetFilters` for the authenticated user.
      operationId: recommendationsFiltersSet
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetFiltersRequestBody'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetFiltersResponseProtoJson'
        '400':
          description: Invalid JSON or relationship_type
        '401':
          description: Unauthorized
        '502':
          description: Bad gateway

  /api/v1/swipes:
    get:
      tags: [Swipes]
      summary: Profiles of users who liked you (incoming likes)
      description: |
        The gateway calls **swipes** gRPC `ListIncomingLikes` with the JWT user id to obtain candidate user ids
        (people who swiped **like** on you, excluding pairs that are already **mutual matches**), then calls
        **profiles** `GetProfiles` with those ids and returns that result — same pattern as **GET /api/v1/recommendations**.
        Ordered by most recently updated swipe row. Use **GET /api/v1/matches** for mutual matches (different selection).
      operationId: swipesListIncomingLikes
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK — same shape as profiles `GetProfiles` (camelCase protobuf JSON, `profilesData`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetProfilesWithFilterResponseProtoJson'
        '401':
          description: Unauthorized
        '502':
          description: Bad gateway
    post:
      tags: [Swipes]
      summary: Record swipe (like or dislike) on a profile
      operationId: swipesAction
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SwipeRequestBody'
      responses:
        '200':
          description: OK — protobuf JSON `{ success }`
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        '400':
          description: Invalid body or self-swipe
        '401':
          description: Unauthorized
        '502':
          description: Bad gateway

  /api/v1/matches:
    get:
      tags: [Matches]
      summary: List matched profiles for the current user
      operationId: matchesGet
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK — same shape as `GetProfiles` (protobuf JSON)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetProfilesResponseSnake'
        '401':
          description: Unauthorized
        '502':
          description: Bad gateway

  /api/v1/notifications/ws:
    get:
      tags: [Notifications]
      summary: WebSocket — live notifications (read docs; not a normal GET)
      description: |
        **OpenAPI models HTTP only; this path is upgraded to a WebSocket.** Do not use “Try it out” here — use a WebSocket client in the browser or a tool such as `websocat`.

        **Connect (browser):** after the user signs in and you have an access token, open:

        `new WebSocket(wsUrl)` where `wsUrl` is built from the **same origin** as your REST base URL, path **`/api/v1/notifications/ws`**, and query **`token=<URL-encoded access_token>`**.

        Examples (replace `<JWT>` with the real access token):

        - Local gateway (docker-compose host mapping): `ws://localhost:18000/api/v1/notifications/ws?token=<JWT>`
        - HTTPS site: `wss://<your-api-host>/api/v1/notifications/ws?token=<JWT>`

        **Why `token` in the query:** browser WebSocket API does not support custom headers; the gateway JWT middleware accepts **`Authorization: Bearer …`** for HTTP and **`?token=`** for WebSocket upgrades (see `services/api-gateway` JWT middleware).

        **After connect:** the server may push JSON objects (schema **`#/components/schemas/NotificationWebSocketMessage`**).
        The service **immediately** replays any notifications stored while the user was offline (`delivered_at` null)
        over this socket after the handshake (then continues with live Kafka-driven events).

        For **`chat.message`**, the chats service publishes to Kafka **only** when the recipient is **not** in an active
        **chat room** WebSocket with the sender (see **`/api/v1/chats/{peer_user_id}/ws`**); otherwise the user already
        saw **`chat.new_message`** on the chat socket. Use `chat_id` / `sender_id` / `message_id` to sync UI when you
        do receive **`chat.message`**. Offline notifications are replayed once when the socket is accepted.

        **Headers on the wire:** the gateway adds **`X-User-Id`** when proxying to the notifications service; the client does not set that header.
      operationId: notificationsWebSocket
      security: []
      parameters:
        - name: token
          in: query
          required: true
          description: 'Same JWT as `Authorization: Bearer` for REST (access token).'
          schema:
            type: string
      responses:
        '101':
          description: |
            Switching Protocols — WebSocket established. Subsequent frames are JSON text from server (and client may send ignored ping text).
        '401':
          description: Missing or invalid `token` query parameter (gateway JWT validation failed)
        '502':
          description: Bad gateway (notifications service unavailable)

  /api/v1/chats:
    get:
      tags: [Chats]
      summary: List chats for the current user
      description: |
        Proxied to `GET /api/v1/chats` on the chats service. Returns chat summaries sorted by latest activity.
      operationId: chatsList
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK — JSON array of chat summaries (**snake_case** from FastAPI)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChatSummaryItem'
        '401':
          description: Unauthorized (missing JWT at gateway or missing `X-User-Id` at chats service)
        '502':
          description: Bad gateway (chats service unreachable)

  /api/v1/chats/{peer_user_id}:
    parameters:
      - name: peer_user_id
        in: path
        required: true
        description: Other participant user id (the chat partner)
        schema:
          type: integer
          format: int64
    get:
      tags: [Chats]
      summary: Open chat — list messages with a user
      description: |
        Proxied to `GET /api/v1/chats/{peer_user_id}`. Returns all messages if a chat exists between the JWT user and `peer_user_id`.

        **Typical client flow:** call this first to render history, then open **WebSocket** `/api/v1/chats/{peer_user_id}/ws?token=<JWT>`
        for live messages and optional WS-based sends (see that path’s description and chat WebSocket schemas).
      operationId: chatsGetWithPeer
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatWithMessagesResponse'
        '401':
          description: Unauthorized
        '404':
          description: Chat not found for this pair
        '502':
          description: Bad gateway
    delete:
      tags: [Chats]
      summary: Delete chat with a user
      description: |
        Proxied to `DELETE /api/v1/chats/{peer_user_id}`. Removes the chat (and related data) for both participants.
      operationId: chatsDeleteWithPeer
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Deleted (no body)
        '401':
          description: Unauthorized
        '502':
          description: Bad gateway

  /api/v1/chats/{peer_user_id}/ws:
    parameters:
      - name: peer_user_id
        in: path
        required: true
        description: Chat partner user id (same as in `GET /api/v1/chats/{peer_user_id}`).
        schema:
          type: integer
          format: int64
      - name: token
        in: query
        required: true
        description: 'Same JWT as `Authorization: Bearer` for REST (access token).'
        schema:
          type: string
    get:
      tags: [Chats]
      summary: WebSocket — chat room (send + receive)
      description: |
        **WebSocket upgrade** (`ws://` / `wss://`). Same **`?token=<JWT>`** rule as **`/api/v1/notifications/ws`**.

        **Receive:** JSON text frames (server → client) matching **`#/components/schemas/ChatWebSocketServerNewMessage`**.

        **Send (client → server):** JSON text frames — **`#/components/schemas/ChatWebSocketClientText`** or **`#/components/schemas/ChatWebSocketClientImage`**.
        Malformed sends may yield **`#/components/schemas/ChatWebSocketClientError`**.

        **REST alternative:** `POST /api/v1/chats/{peer_user_id}/messages` (JSON or multipart file) triggers the same persistence + broadcast + Kafka rules.

        **Kafka `chat.message`:** published **only** when the **recipient** does **not** have an active room with the sender (offline / not in thread). No buffering on disconnect.

        URL example: `ws://localhost:18000/api/v1/chats/9/ws?token=<JWT>`
      operationId: chatsRoomWebSocket
      security: []
      responses:
        '101':
          description: Switching Protocols — WebSocket established
        '401':
          description: Missing or invalid `token` (gateway)
        '404':
          description: Chat not found for this pair (chats service closes before accept)
        '502':
          description: Bad gateway

  /api/v1/chats/{peer_user_id}/messages:
    parameters:
      - name: peer_user_id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    post:
      tags: [Chats]
      summary: Send a chat message (text and/or image)
      description: |
        Proxied to `POST /api/v1/chats/{peer_user_id}/messages` on the chats service (`201 Created`).

        Use **`application/json`** with `{"body":"..."}` for a plain text message, or **`multipart/form-data`**
        with optional part **`body`** (caption) and/or **`file`** (image). At least one of `body` or `file` is required
        for multipart. Images must be **JPEG, PNG, or WebP** (max **10 MiB**); the service stores the object in MinIO
        and returns `image_storage_key` on the created message. Kafka `chat.message` preview uses the caption when
        present, otherwise `"[image]"` for image-only messages.

        **Live delivery:** after a successful create, the chats service broadcasts **`chat.new_message`** on open
        **chat room** WebSockets for this pair (see **`/api/v1/chats/{peer_user_id}/ws`**). **`chat.message`** Kafka
        (and thus **notifications** WebSocket) is emitted **only** if the recipient is **not** in an active chat room
        with the sender.
      operationId: chatsSendMessage
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendChatTextMessageBody'
          multipart/form-data:
            schema:
              type: object
              properties:
                body:
                  type: string
                  maxLength: 10000
                  description: Optional caption when sending an image, or text-only content when `file` is omitted.
                file:
                  type: string
                  format: binary
                  description: Optional image (jpeg, png, webp); max 10 MiB.
              description: |
                Send at least one of `body` or `file`. Both may be set (image with caption).
      responses:
        '201':
          description: Created — message object (**snake_case**)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatMessageItem'
        '400':
          description: |
            Invalid request (e.g. neither `body` nor `file`, empty JSON `body`, unsupported image type, image too large,
            or invalid peer).
        '401':
          description: Unauthorized
        '404':
          description: Chat not found for this pair
        '422':
          description: Invalid JSON body
        '502':
          description: Bad gateway (upstream chats service or object storage failure)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: RSA-signed JWT; `sub` claim must be numeric user id.

  schemas:
    NotificationWebSocketMessage:
      type: object
      description: |
        One JSON object per WebSocket **text** frame from server → client (`JSON.parse(event.data)`).
        Persisted offline replays may only include **`type`** and **`message`**.

        **`chat.message`:** the chats service publishes this to Kafka only when the recipient is **not** in an active
        chat room (`/api/v1/chats/{peer_user_id}/ws`) with the sender; otherwise the user already received
        **`chat.new_message`** on the chat WebSocket.

        **`swipe.created`:** emitted when another user **likes** you (not on mutual match — you get **`match.created`** instead).
        Includes **`viewer_id`** on live delivery when the user is online; offline replay may omit it.
      required: [type, message]
      properties:
        type:
          type: string
          description: Event name (e.g. `chat.message`, `chat.deleted`, `match.created`, `swipe.created`).
        message:
          type: string
          description: Human-readable body (e.g. chat preview text).
        chat_id:
          type: string
          description: Optional. Chat UUID string; included on live **`chat.message`** deliveries when available.
        message_id:
          type: string
          description: Optional. Message UUID string; included on live **`chat.message`** when available.
        sender_id:
          type: integer
          format: int64
          description: Optional. Included on live **`chat.message`** when available (who sent).
        viewer_id:
          type: integer
          format: int64
          description: Optional. Who liked you; included on live **`swipe.created`** when available.

    ChatWebSocketServerNewMessage:
      type: object
      description: Server → client frame after a message is persisted (REST or chat WS send).
      required: [type, chat_id, message]
      properties:
        type:
          type: string
          enum: [chat.new_message]
        chat_id:
          type: string
          description: Chat UUID string
        message:
          $ref: '#/components/schemas/ChatMessageItem'

    ChatWebSocketClientText:
      type: object
      description: Client → server frame to send a text message (same rules as JSON `POST .../messages` body).
      required: [type, body]
      properties:
        type:
          type: string
          enum: [text]
        body:
          type: string
          minLength: 1
          maxLength: 10000

    ChatWebSocketClientImage:
      type: object
      description: |
        Client → server frame to send an image. **Base64** payload (standard encoding; whitespace allowed).
        Server may infer `image/jpeg` / `image/png` / `image/webp` from magic bytes if `content_type` is missing or `application/octet-stream`.
      required: [type, image_base64]
      properties:
        type:
          type: string
          enum: [image]
        body:
          type: string
          maxLength: 10000
          nullable: true
          description: Optional caption
        image_base64:
          type: string
          description: Base64-encoded raw image bytes (max decoded size 10 MiB on server)
        content_type:
          type: string
          nullable: true
          description: Optional; e.g. `image/jpeg`

    ChatWebSocketClientError:
      type: object
      description: Server → client when a client-sent frame failed validation or persistence.
      required: [type, detail]
      properties:
        type:
          type: string
          enum: [error]
        detail:
          type: string

    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    SwipeRequestBody:
      type: object
      required: [target_user_id, liked]
      properties:
        target_user_id:
          type: integer
          format: int64
        liked:
          type: boolean

    AuthResponse:
      type: object
      required: [access_token, refresh_token, token_type]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          default: bearer

    RefreshTokenRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    RefreshTokenResponse:
      type: object
      required: [access_token, token_type]
      properties:
        access_token:
          type: string
        token_type:
          type: string
          default: bearer

    LogoutRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    DeleteAccountRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    MessageResponse:
      type: object
      properties:
        message:
          type: string

    NotImplementedError:
      type: object
      properties:
        error:
          type: string

    ImageSnake:
      type: object
      properties:
        id:
          type: integer
          format: int64
        url:
          type: string
        create_at:
          type: integer
          format: int64

    ShortProfileSnake:
      type: object
      properties:
        user_id:
          type: integer
          format: int64
        username:
          type: string
        avatar_image:
          $ref: '#/components/schemas/ImageSnake'
        bio:
          type: string
        age:
          type: integer
          format: int64
        sign:
          type: string
        city:
          type: string
        tags:
          type: array
          items:
            type: string
        images:
          type: array
          items:
            $ref: '#/components/schemas/ImageSnake'

    FullProfileSnake:
      type: object
      properties:
        user_id:
          type: integer
          format: int64
        username:
          type: string
        avatar_image:
          $ref: '#/components/schemas/ImageSnake'
        bio:
          type: string
        age:
          type: integer
          format: int64
        sign:
          type: string
        city:
          type: string
        relationship_type:
          type: integer
          description: Enum numeric value (protobuf enum)
          enum: [0, 1, 2, 3]
        search_for:
          type: string
        tags:
          type: array
          items:
            type: string
        images:
          type: array
          items:
            $ref: '#/components/schemas/ImageSnake'

    GetProfileResponseSnake:
      type: object
      properties:
        profile_data:
          $ref: '#/components/schemas/FullProfileSnake'

    GetProfilesResponseSnake:
      type: object
      properties:
        profiles_data:
          type: array
          items:
            $ref: '#/components/schemas/ShortProfileSnake'

    CreateProfileRequestBody:
      type: object
      required: [username, bio, birthday, gender, relationship_type]
      properties:
        username:
          type: string
        avatar_image_id:
          type: integer
          format: int64
          description: Optional; must reference an existing uploaded image for this user.
        bio:
          type: string
        birthday:
          type: integer
          format: int64
          description: Unix seconds (protobuf `ProfileRequest.birthday`)
        gender:
          type: string
          description: "`MALE`, `FEMALE`, or short `M` / `F`"
        sign:
          type: string
        city:
          type: string
        search_for:
          type: string
        relationship_type:
          type: string
          description: >
            `FRIENDSHIP`, `SEARCH_FOR_FRIENDSHIP`, `RELATIONSHIP`, `SEARCH_FOR_RELATIONSHIP`,
            `NETWORKING`, `SEARCH_FOR_NETWORKING`, `UNSPECIFIED`, `SEARCH_FOR_UNSPECIFIED`
        tags:
          type: array
          items:
            type: string

    CreateProfileResponseSnake:
      type: object
      properties:
        success:
          type: boolean

    UpdateProfileRequestBody:
      type: object
      description: All fields optional; send only fields to update.
      properties:
        username:
          type: string
        avatar_image_id:
          type: integer
          format: int64
        bio:
          type: string
        city:
          type: string
        search_for:
          type: string
        relationship_type:
          type: string
          description: >
            `FRIENDSHIP`, `SEARCH_FOR_FRIENDSHIP`, `RELATIONSHIP`, `SEARCH_FOR_RELATIONSHIP`,
            `NETWORKING`, `SEARCH_FOR_NETWORKING`, `UNSPECIFIED`, `SEARCH_FOR_UNSPECIFIED`

    UpdateProfileResponseSnake:
      type: object
      properties:
        profile_data:
          $ref: '#/components/schemas/FullProfileSnake'

    DeleteProfileImagesRequestBody:
      type: object
      required: [image_ids]
      properties:
        image_ids:
          type: array
          items:
            type: integer
            format: int64

    DeleteProfileImagesResponseSnake:
      type: object
      properties:
        success:
          type: boolean

    UploadImagesResponseGateway:
      type: object
      properties:
        user_id:
          type: integer
          format: int64
        images:
          type: array
          items:
            $ref: '#/components/schemas/ImageSnake'

    TagsRequestBody:
      type: object
      required: [tags]
      properties:
        tags:
          type: array
          items:
            type: string

    TagsSuccessResponseSnake:
      type: object
      properties:
        success:
          type: boolean

    DetachTagsSuccessResponseSnake:
      type: object
      properties:
        success:
          type: boolean

    ImageProtoJson:
      type: object
      properties:
        id:
          type: string
          description: Protobuf JSON int64 may be string
        url:
          type: string
        createAt:
          type: string

    ShortProfileProtoJson:
      type: object
      properties:
        userId:
          type: string
        username:
          type: string
        avatarImage:
          $ref: '#/components/schemas/ImageProtoJson'
        bio:
          type: string
        age:
          type: string
        sign:
          type: string
        city:
          type: string
        tags:
          type: array
          items:
            type: string
        images:
          type: array
          items:
            $ref: '#/components/schemas/ImageProtoJson'

    GetProfilesWithFilterResponseProtoJson:
      type: object
      properties:
        profilesData:
          type: array
          items:
            $ref: '#/components/schemas/ShortProfileProtoJson'

    CompatibilityRequestBody:
      type: object
      required: [user_ids]
      properties:
        user_ids:
          type: array
          description: Other profile user ids to compare with the authenticated user (snake_case JSON field name). May be empty.
          items:
            type: integer
            format: int64

    CompatibilityTextItemProtoJson:
      type: object
      properties:
        userId:
          type: string
          description: Protobuf JSON may serialize int64 as string
        text:
          type: string
          description: Generated blurb or default placeholder when the user is unknown in recommendations DB

    GetCompatibilityTextsResponseProtoJson:
      type: object
      description: Recommendations gRPC GetCompatibilityTexts response (camelCase protobuf JSON)
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CompatibilityTextItemProtoJson'

    GetFiltersResponseProtoJson:
      type: object
      description: Recommendations gRPC GetFilters response (camelCase protobuf JSON)
      properties:
        relationshipType:
          type: string
          description: e.g. SEARCH_FOR_FRIENDSHIP
        ageFrom:
          type: string
        ageTo:
          type: string
        city:
          type: string
        sign:
          type: string
        tags:
          type: array
          items:
            type: string
        partnerGender:
          type: string
          description: MALE or FEMALE; applied for relationship search mode only.

    SetFiltersRequestBody:
      type: object
      description: >
        All fields optional; only sent fields are applied by the recommendations service.
        Each property may be sent in snake_case (below) or camelCase as in protobuf JSON
        (`relationshipType`, `ageFrom`, `ageTo`, `partnerGender`). Age bounds may be JSON numbers or quoted strings.
      properties:
        relationship_type:
          type: string
          description: >
            `FRIENDSHIP`, `SEARCH_FOR_FRIENDSHIP`, `RELATIONSHIP`, `SEARCH_FOR_RELATIONSHIP`,
            `NETWORKING`, `SEARCH_FOR_NETWORKING`, `UNSPECIFIED`, `SEARCH_FOR_UNSPECIFIED`
        relationshipType:
          type: string
          description: camelCase alias of relationship_type
        age_from:
          type: integer
          format: int64
        ageFrom:
          type: integer
          format: int64
          description: camelCase alias of age_from; may be sent as a string in clients that quote numbers
        age_to:
          type: integer
          format: int64
        ageTo:
          type: integer
          format: int64
          description: camelCase alias of age_to; may be sent as a string
        city:
          type: string
        sign:
          type: string
        tags:
          type: array
          items:
            type: string
        partner_gender:
          type: string
          description: MALE or FEMALE
        partnerGender:
          type: string
          description: camelCase alias of partner_gender

    SetFiltersResponseProtoJson:
      type: object
      properties:
        success:
          type: boolean

    ChatSummaryItem:
      type: object
      description: One row from `GET /api/v1/chats` (chats service)
      properties:
        chat_id:
          type: string
          description: Chat UUID as string
        peer_user_id:
          type: integer
          format: int64
        last_message_at:
          type: string
          nullable: true
          description: ISO-8601 timestamp or null if no messages
        last_message_preview:
          type: string
          nullable: true
          description: Text preview or `[image]` for image-only last message

    ChatMessageItem:
      type: object
      properties:
        id:
          type: string
          description: Message UUID as string
        sender_id:
          type: integer
          format: int64
        body:
          type: string
          nullable: true
        image_storage_key:
          type: string
          nullable: true
        created_at:
          type: string
          description: ISO-8601 timestamp

    ChatWithMessagesResponse:
      type: object
      properties:
        chat_id:
          type: string
        peer_user_id:
          type: integer
          format: int64
        messages:
          type: array
          items:
            $ref: '#/components/schemas/ChatMessageItem'

    SendChatTextMessageBody:
      type: object
      required: [body]
      properties:
        body:
          type: string
          minLength: 1
          maxLength: 10000
          description: Message text
