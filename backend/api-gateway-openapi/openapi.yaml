openapi: 3.0.3
info:
  title: Commit API Gateway
  description: |
    HTTP surface exposed by the **api-gateway** service (`services/api-gateway`).

    - **Auth** paths under `/api/v1/auth/*` are reverse-proxied to the authentication service (FastAPI).
      Request/response bodies match that service unless noted.
    - **Profiles**, **recommendations**, **swipes**, and **matches** handlers are implemented in the gateway (or stubbed).
    - **Recommendations** HTTP routes call the **recommendations** gRPC service for ids and stored filters, then the **profiles** gRPC service to load profile rows.
    - Protected routes require `Authorization: Bearer <JWT>`. The gateway validates the token and expects a numeric `sub` claim (user id).

    **JSON naming**
    - Profile handlers serialize protobuf types with Go `encoding/json` using **snake_case** field names (e.g. `profile_data`, `user_id`).
    - Recommendation responses use **protobuf JSON** (`protojson`): **camelCase** names and enum values as strings.

    JWT middleware may return **plain text** errors (e.g. `Unauthorized`); handlers often return JSON `{"error":"..."}`.
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Local API gateway (change host/port to match your deployment)

tags:
  - name: Health
  - name: Auth
    description: Proxied to the authentication service
  - name: Profiles
  - name: Recommendations
  - name: Swipes
  - name: Matches

paths:
  /health:
    get:
      tags: [Health]
      summary: Liveness check
      operationId: healthCheck
      responses:
        '200':
          description: Service is up
          content:
            text/plain:
              schema:
                type: string
                example: ok

  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      operationId: authRegister
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '4XX':
          description: Validation or conflict (auth service)
        '502':
          description: Bad gateway (proxy error)

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login
      operationId: authLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials
        '502':
          description: Bad gateway

  /api/v1/auth/token:
    post:
      tags: [Auth]
      summary: Refresh access token
      operationId: authRefreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshTokenResponse'
        '502':
          description: Bad gateway

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Logout (invalidate refresh token)
      operationId: authLogout
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: Missing or invalid JWT
        '502':
          description: Bad gateway

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Current user (proxied)
      description: |
        Forwarded to the authentication service. The backend currently documents `DELETE /api/v1/auth/me` for account deletion;
        `GET` availability depends on the auth service implementation.
      operationId: authGetMe
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Success (shape defined by auth service)
        '401':
          description: Missing or invalid JWT
        '404':
          description: Not implemented on auth service
        '502':
          description: Bad gateway
    delete:
      tags: [Auth]
      summary: Delete account
      operationId: authDeleteAccount
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteAccountRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: Missing or invalid JWT
        '502':
          description: Bad gateway

  /api/v1/profiles/me:
    get:
      tags: [Profiles]
      summary: Get my profile
      operationId: profilesGetMe
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK (snake_case JSON)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetProfileResponseSnake'
        '401':
          description: Unauthorized
        '502':
          description: Bad gateway
    put:
      tags: [Profiles]
      summary: Update my profile
      operationId: profilesUpdateMe
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequestBody'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateProfileResponseSnake'
        '400':
          description: Invalid body or relationship_type
        '401':
          description: Unauthorized
        '502':
          description: Bad gateway

  /api/v1/profiles:
    get:
      tags: [Profiles]
      summary: Get profiles by ids
      operationId: profilesGetByIds
      security:
        - bearerAuth: []
      parameters:
        - name: ids
          in: query
          required: true
          description: Comma-separated user ids
          schema:
            type: string
            example: '1,2,3'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetProfilesResponseSnake'
        '400':
          description: Missing or invalid ids
        '401':
          description: Unauthorized
        '502':
          description: Bad gateway

  /api/v1/profiles/{user_id}:
    get:
      tags: [Profiles]
      summary: Get profile by user id
      operationId: profilesGetById
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetProfileResponseSnake'
        '400':
          description: Invalid user_id
        '401':
          description: Unauthorized
        '502':
          description: Bad gateway

  /api/v1/profiles/images:
    post:
      tags: [Profiles]
      summary: Upload profile images (multipart)
      operationId: profilesUploadImages
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                images:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Preferred field name for multiple files
                image:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Alternative field name accepted by the gateway
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadImagesResponseGateway'
        '400':
          description: Invalid multipart / no files
        '401':
          description: Unauthorized
        '502':
          description: Bad gateway
    delete:
      tags: [Profiles]
      summary: Delete profile images by id
      operationId: profilesDeleteImages
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteProfileImagesRequestBody'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteProfileImagesResponseSnake'
        '400':
          description: Invalid body
        '401':
          description: Unauthorized
        '502':
          description: Bad gateway

  /api/v1/profiles/tags:
    post:
      tags: [Profiles]
      summary: Attach tags to my profile
      operationId: profilesAttachTags
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagsRequestBody'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagsSuccessResponseSnake'
        '400':
          description: Invalid JSON
        '401':
          description: Unauthorized
        '502':
          description: Bad gateway
    delete:
      tags: [Profiles]
      summary: Detach tags from my profile
      operationId: profilesDetachTags
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagsRequestBody'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetachTagsSuccessResponseSnake'
        '400':
          description: Invalid JSON
        '401':
          description: Unauthorized
        '502':
          description: Bad gateway

  /api/v1/recommendations:
    get:
      tags: [Recommendations]
      summary: Recommended profiles for the current user
      description: |
        No query parameters or body. The gateway calls the **recommendations** gRPC `GetRecommendationsForUser` with the JWT user id,
        receives candidate user ids and filter criteria, then calls **profiles** `GetProfilesWithFilter` and returns that result.
      operationId: recommendationsGet
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK — same shape as profiles `GetProfilesWithFilter` (camelCase protobuf JSON)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetProfilesWithFilterResponseProtoJson'
        '401':
          description: Unauthorized
        '502':
          description: Bad gateway (recommendations or profiles gRPC error)

  /api/v1/recommendations/filters:
    get:
      tags: [Recommendations]
      summary: Get stored recommendation filters
      description: Proxies to recommendations gRPC `GetFilters` for the authenticated user.
      operationId: recommendationsFiltersGet
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK (protobuf JSON)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetFiltersResponseProtoJson'
        '401':
          description: Unauthorized
        '502':
          description: Bad gateway
    post:
      tags: [Recommendations]
      summary: Update stored recommendation filters
      description: Proxies to recommendations gRPC `SetFilters` for the authenticated user.
      operationId: recommendationsFiltersSet
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetFiltersRequestBody'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetFiltersResponseProtoJson'
        '400':
          description: Invalid JSON or relationship_type
        '401':
          description: Unauthorized
        '502':
          description: Bad gateway

  /api/v1/swipes:
    post:
      tags: [Swipes]
      summary: Record swipe action (stub)
      operationId: swipesAction
      security:
        - bearerAuth: []
      responses:
        '501':
          description: Not implemented
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotImplementedError'
        '401':
          description: Unauthorized

  /api/v1/matches:
    get:
      tags: [Matches]
      summary: List matches (stub)
      operationId: matchesGet
      security:
        - bearerAuth: []
      responses:
        '501':
          description: Not implemented
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotImplementedError'
        '401':
          description: Unauthorized

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: RSA-signed JWT; `sub` claim must be numeric user id.

  schemas:
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      required: [access_token, refresh_token, token_type]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          default: bearer

    RefreshTokenRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    RefreshTokenResponse:
      type: object
      required: [access_token, token_type]
      properties:
        access_token:
          type: string
        token_type:
          type: string
          default: bearer

    LogoutRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    DeleteAccountRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    MessageResponse:
      type: object
      properties:
        message:
          type: string

    NotImplementedError:
      type: object
      properties:
        error:
          type: string

    ImageSnake:
      type: object
      properties:
        id:
          type: integer
          format: int64
        url:
          type: string
        create_at:
          type: integer
          format: int64

    ShortProfileSnake:
      type: object
      properties:
        user_id:
          type: integer
          format: int64
        username:
          type: string
        avatar_image:
          $ref: '#/components/schemas/ImageSnake'
        bio:
          type: string
        age:
          type: integer
          format: int64
        sign:
          type: string
        city:
          type: string
        tags:
          type: array
          items:
            type: string
        images:
          type: array
          items:
            $ref: '#/components/schemas/ImageSnake'

    FullProfileSnake:
      type: object
      properties:
        user_id:
          type: integer
          format: int64
        username:
          type: string
        avatar_image:
          $ref: '#/components/schemas/ImageSnake'
        bio:
          type: string
        age:
          type: integer
          format: int64
        sign:
          type: string
        city:
          type: string
        relationship_type:
          type: integer
          description: Enum numeric value (protobuf enum)
          enum: [0, 1, 2, 3]
        search_for:
          type: string
        tags:
          type: array
          items:
            type: string
        images:
          type: array
          items:
            $ref: '#/components/schemas/ImageSnake'

    GetProfileResponseSnake:
      type: object
      properties:
        profile_data:
          $ref: '#/components/schemas/FullProfileSnake'

    GetProfilesResponseSnake:
      type: object
      properties:
        profiles_data:
          type: array
          items:
            $ref: '#/components/schemas/ShortProfileSnake'

    UpdateProfileRequestBody:
      type: object
      description: All fields optional; send only fields to update.
      properties:
        username:
          type: string
        avatar_image_id:
          type: integer
          format: int64
        bio:
          type: string
        city:
          type: string
        search_for:
          type: string
        relationship_type:
          type: string
          description: >
            `FRIENDSHIP`, `SEARCH_FOR_FRIENDSHIP`, `RELATIONSHIP`, `SEARCH_FOR_RELATIONSHIP`,
            `NETWORKING`, `SEARCH_FOR_NETWORKING`, `UNSPECIFIED`, `SEARCH_FOR_UNSPECIFIED`

    UpdateProfileResponseSnake:
      type: object
      properties:
        profile_data:
          $ref: '#/components/schemas/FullProfileSnake'

    DeleteProfileImagesRequestBody:
      type: object
      required: [image_ids]
      properties:
        image_ids:
          type: array
          items:
            type: integer
            format: int64

    DeleteProfileImagesResponseSnake:
      type: object
      properties:
        success:
          type: boolean

    UploadImagesResponseGateway:
      type: object
      properties:
        user_id:
          type: integer
          format: int64
        images:
          type: array
          items:
            $ref: '#/components/schemas/ImageSnake'

    TagsRequestBody:
      type: object
      required: [tags]
      properties:
        tags:
          type: array
          items:
            type: string

    TagsSuccessResponseSnake:
      type: object
      properties:
        success:
          type: boolean

    DetachTagsSuccessResponseSnake:
      type: object
      properties:
        success:
          type: boolean

    ImageProtoJson:
      type: object
      properties:
        id:
          type: string
          description: Protobuf JSON int64 may be string
        url:
          type: string
        createAt:
          type: string

    ShortProfileProtoJson:
      type: object
      properties:
        userId:
          type: string
        username:
          type: string
        avatarImage:
          $ref: '#/components/schemas/ImageProtoJson'
        bio:
          type: string
        age:
          type: string
        sign:
          type: string
        city:
          type: string
        tags:
          type: array
          items:
            type: string
        images:
          type: array
          items:
            $ref: '#/components/schemas/ImageProtoJson'

    GetProfilesWithFilterResponseProtoJson:
      type: object
      properties:
        profilesData:
          type: array
          items:
            $ref: '#/components/schemas/ShortProfileProtoJson'

    GetFiltersResponseProtoJson:
      type: object
      description: Recommendations gRPC GetFilters response (camelCase protobuf JSON)
      properties:
        relationshipType:
          type: string
          description: e.g. SEARCH_FOR_FRIENDSHIP
        ageFrom:
          type: string
        ageTo:
          type: string
        city:
          type: string
        sign:
          type: string
        tags:
          type: array
          items:
            type: string

    SetFiltersRequestBody:
      type: object
      description: All fields optional; only sent fields are applied by the recommendations service.
      properties:
        relationship_type:
          type: string
          description: >
            `FRIENDSHIP`, `SEARCH_FOR_FRIENDSHIP`, `RELATIONSHIP`, `SEARCH_FOR_RELATIONSHIP`,
            `NETWORKING`, `SEARCH_FOR_NETWORKING`, `UNSPECIFIED`, `SEARCH_FOR_UNSPECIFIED`
        age_from:
          type: integer
          format: int64
        age_to:
          type: integer
          format: int64
        city:
          type: string
        sign:
          type: string
        tags:
          type: array
          items:
            type: string

    SetFiltersResponseProtoJson:
      type: object
      properties:
        success:
          type: boolean
