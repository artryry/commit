syntax = "proto3";

package profile.v1;

option go_package = "github.com/artryry/commit/services/api-gateway/src/internal/transport/grpc/profiles/proto/gen;profilepb";

service ProfileService {
    rpc CreateProfile(CreateProfileRequest) returns (CreateProfileResponse);
    rpc GetProfile(GetProfileRequest) returns (GetProfileResponse);
    rpc GetProfiles(GetProfilesRequest) returns (GetProfilesResponse);
    rpc UpdateProfile(UpdateProfileRequest) returns (UpdateProfileResponse);

    rpc GetProfilesWithFilter(GetProfilesWithFilterRequest) returns (GetProfilesWithFilterResponse);
    
    rpc UploadProfileImage(UploadProfileImageRequest) returns (UploadProfileImageResponse);
    rpc DeleteProfileImages(DeleteProfileImagesRequest) returns (DeleteProfileImagesResponse);

    rpc AttachProfileTags (AddProfileTagsRequest) returns (AddProfileTagsResponse);
    rpc DetachProfileTags (DetachProfileTagsRequest) returns (DetachProfileTagsResponse);
}

message ShortProfile {
  int64 user_id = 1;
  string username = 2;
  Image avatar_image = 3;
  string bio = 4;
  int64 age = 5;
  string sign = 6;
  string city = 7;
  repeated string tags = 8;
  repeated Image images = 9;
}

message FullProfile {
    int64 user_id = 1;
    string username = 2;
    Image avatar_image = 3;
    string bio = 4;
    int64 age = 5;
    string sign = 6;
    string city = 7;
    RelationshipType relationship_type = 8;
    string search_for = 9;
    repeated string tags = 10;
    repeated Image images = 11;
}

message ProfileRequest {
    int64 user_id = 1;
    string username = 2;
    Image avatar_image = 3;
    string bio = 4;
    int64 birthday = 5;
    Gender gender = 6;
    string sign = 7;
    string city = 8;
    RelationshipType relationship_type = 9;
    string search_for = 10;
    repeated string tags = 11;
    repeated Image images = 12;
}

message Image {
    int64 id = 1;
    string url = 2;
    int64 create_at = 3;
}

enum RelationshipType {
    SEARCH_FOR_UNSPECIFIED = 0;
    SEARCH_FOR_FRIENDSHIP = 1;
    SEARCH_FOR_RELATIONSHIP = 2;
    SEARCH_FOR_NETWORKING = 3;
}

enum Gender {
    MALE = 0;
    FEMALE = 1;
}

message GetProfileRequest {
  int64 user_id = 1;
}

message GetProfileResponse {
  FullProfile profile_data = 1;
}

message GetProfilesRequest {
    repeated int64 user_ids = 1;
}

message GetProfilesResponse {
    repeated ShortProfile profiles_data = 1;
}

message UpdateProfileRequest {
    int64 user_id = 1;

    optional string username = 2;
    optional int64 avatar_image_id = 3;
    optional string bio = 4;
    optional string city = 5;
    optional string search_for = 6;
    optional RelationshipType relationship_type = 7;
}

message UpdateProfileResponse {
    FullProfile profile_data = 1;
}

message DeleteProfileImagesRequest {
    repeated int64 image_ids = 1;
}

message DeleteProfileImagesResponse {
    bool success = 1;
}

message UploadProfileImageRequest {
    int64 user_id = 1;
    bytes image = 2;
}

message UploadProfileImageResponse {
    int64 user_id = 1;
    Image image = 2;
}

message CreateProfileRequest {
    ProfileRequest profile = 1;
}

message CreateProfileResponse {
    bool success = 1;
}

message AddProfileTagsRequest {
    int64 user_id = 1;
    repeated string tags = 2;
}

message AddProfileTagsResponse {
    bool success = 1;
}

message DetachProfileTagsRequest {
    int64 user_id = 1;
    repeated string tags = 2;
}

message DetachProfileTagsResponse {
    bool success = 1;
}

message GetProfilesWithFilterRequest {
    repeated int64 user_ids = 1;

    optional RelationshipType relationship_type = 2;
    optional int64 age_from = 3;
    optional int64 age_to = 4;
    optional string city = 5;
    optional string sign = 6;

    repeated string tags = 7;
}

message GetProfilesWithFilterResponse {
    repeated ShortProfile profiles_data = 1;
}
