syntax = "proto3";

package recommendation.v1;

option go_package = "github.com/artryry/commit/services/api-gateway/src/internal/transport/grpc/recommendations/proto/gen;recommendationpb";

import "profile.proto";

// RecommendationService is implemented by the recommendations microservice.
// The API gateway calls it for candidate user ids; GET /recommendations then loads profile rows via profiles.GetProfiles.
service RecommendationService {
  // Returns candidate profile user ids (recommendations apply stored filters when selecting ids).
  rpc GetRecommendationsForUser(GetRecommendationsForUserRequest) returns (GetRecommendationsForUserResponse);

  rpc GetCompatibilityTexts(GetCompatibilityTextsRequest) returns (GetCompatibilityTextsResponse);

  rpc GetFilters(GetFiltersRequest) returns (GetFiltersResponse);
  rpc SetFilters(SetFiltersRequest) returns (SetFiltersResponse);
}

message GetRecommendationsForUserRequest {
  int64 user_id = 1;
}

message GetRecommendationsForUserResponse {
  repeated int64 candidate_user_ids = 1;
  optional profile.v1.RelationshipType relationship_type = 2;
  optional int64 age_from = 3;
  optional int64 age_to = 4;
  optional string city = 5;
  optional string sign = 6;
  repeated string tags = 7;
  optional profile.v1.Gender partner_gender = 8;
}

message GetCompatibilityTextsRequest {
  int64 viewer_user_id = 1;
  repeated int64 other_user_ids = 2;
}

message CompatibilityTextItem {
  int64 user_id = 1;
  string text = 2;
}

message GetCompatibilityTextsResponse {
  repeated CompatibilityTextItem items = 1;
}

message GetFiltersRequest {
  int64 user_id = 1;
}

message GetFiltersResponse {
  optional profile.v1.RelationshipType relationship_type = 1;
  optional int64 age_from = 2;
  optional int64 age_to = 3;
  optional string city = 4;
  optional string sign = 5;
  repeated string tags = 6;
  optional profile.v1.Gender partner_gender = 7;
}

message SetFiltersRequest {
  int64 user_id = 1;
  optional profile.v1.RelationshipType relationship_type = 2;
  optional int64 age_from = 3;
  optional int64 age_to = 4;
  optional string city = 5;
  optional string sign = 6;
  repeated string tags = 7;
  optional profile.v1.Gender partner_gender = 8;
}

message SetFiltersResponse {
  bool success = 1;
}
