syntax = "proto3";

package swipes.v1;

option go_package = "github.com/artryry/commit/backend/services/swipes/src/internal/transport/grpc/proto/gen;swipespb";

service SwipesService {
  rpc RecordSwipe(RecordSwipeRequest) returns (RecordSwipeResponse);
  rpc ListMatches(ListMatchesRequest) returns (ListMatchesResponse);
  rpc ListIncomingLikes(ListIncomingLikesRequest) returns (ListIncomingLikesResponse);
}

message RecordSwipeRequest {
  int64 viewer_user_id = 1;
  int64 target_user_id = 2;
  bool liked = 3;
}

message RecordSwipeResponse {
  bool success = 1;
}

message ListMatchesRequest {
  int64 user_id = 1;
}

message ListMatchesResponse {
  repeated int64 matched_user_ids = 1;
}

message ListIncomingLikesRequest {
  int64 user_id = 1;
}

message ListIncomingLikesResponse {
  // Other users who swiped like on user_id, excluding pairs that are already mutual matches.
  repeated int64 user_ids = 1;
}
