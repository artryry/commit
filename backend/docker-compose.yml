# API-gateway
  api-gateway:
    container_name: api-gateway
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    ports:
      - 8000:8000
    env_file:
      - ./services/api-gateway/.env
    depends_on:
      - ms-auth
      - ms-profiles
    restart: always

# Kafka
  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: kafka
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - 9092:9092
    depends_on:
      - zookeeper
    restart: always

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_INIT_LIMIT: 5
    ports:
      - 2181:2181
    restart: always

  kafka-init:
    image: confluentinc/cp-kafka:7.7.0
    depends_on:
      - kafka
    volumes:
      - ./kafka-topics-init.sh:/kafka-topics-init.sh
    entrypoint: ["/bin/bash", "/kafka-topics-init.sh"]

# Authentications Service
  ms-auth:
    container_name: ms-auth
    build:
      context: ./services/authentications
      dockerfile: Dockerfile
    ports:
      - 8001:8001
    env_file:
      - ./services/authentications/.env
    depends_on:
      - db-auth
      - kafka-init
    restart: always

  db-auth:
    image: postgres:latest
    container_name: db-auth
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: my_own_password_123
      POSTGRES_DB: auth_users
    volumes:
      - postgres_data_auth:/var/lib/postgresql/data
    ports:
      - 5432:5432
    restart: always

# Profiles Service
  ms-profiles:
    container_name: ms-profiles
    build:
      context: ./services/profiles
      dockerfile: Dockerfile
    ports:
      - 8002:8002
    env_file:
      - ./services/profiles/.env
    depends_on:
      - db-profiles
      - ms-auth
      - kafka-init
      - minio
    restart: always

  db-profiles:
    image: postgres:latest
    container_name: db-profiles
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: my_own_password_123
      POSTGRES_DB: profiles
    volumes:
      - postgres_data_profiles:/var/lib/postgresql/data
    ports:
      - 5433:5432
    restart: always

  minio:
    image: minio/minio
    container_name: minio
    command: server /data
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    ports:
      - "9000:9000"
    volumes:
      - minio_data:/var/lib/minio/data

