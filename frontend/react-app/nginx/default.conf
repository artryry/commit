server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ─── Security headers ───────────────────────────────────
    add_header X-Frame-Options         "SAMEORIGIN"       always;
    add_header X-Content-Type-Options  "nosniff"          always;
    add_header X-XSS-Protection        "1; mode=block"    always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;

    # ─── Gzip compression ──────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ─── Static assets (hashed by Vite → aggressive caching) ──
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpe?g|gif|webp|avif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ─── API reverse-proxy (/api/v1/* → api-gateway:8000) ──
    location /api/v1/ {
        proxy_pass         http://api-gateway:8000/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket support (for future real-time features)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;

        # File uploads
        client_max_body_size 20M;
    }

    # ─── Catch-all /api/* → api-gateway (fallback) ─────────
    location /api/ {
        proxy_pass         http://api-gateway:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 20M;
    }

    # ─── SPA fallback (React Router client-side routing) ───
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Health-check endpoint ─────────────────────────────
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
